name: Deploy site

# Only the landing page's own sources — including the pure core the wasm hero
# depends on. A GUI-only change (main.rs, ui/) does not trigger a redeploy.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "examples/site.rs"
      - "examples/build_site.rs"
      - "src/wasm.rs"
      - "src/noise.rs"
      - "src/contour.rs"
      - "src/smooth.rs"
      - "src/geom.rs"
      - "Cargo.toml"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm hero engine
        run: >-
          wasm-pack build --target web --release
          --out-dir web/wasm --out-name hypso
          -- --no-default-features

      - name: Generate images and icons (Hypso engine)
        run: cargo run --release --example site --no-default-features --features render

      - name: Assemble dist/
        run: cargo run --release --example build_site --no-default-features

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
